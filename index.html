<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة تقسيم الصور</title>
    <!-- مكتبات لإنشاء ملفات ZIP وتحميلها داخل المتصفح -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background-color: #f3f4f6; color: #374151; overflow: hidden;}
        
        /* تصميم الشريط الجانبي */
        .sidebar { width: 340px; min-width: 340px; background: white; padding: 24px; border-left: 1px solid #e5e7eb; overflow-y: auto; box-shadow: -2px 0 5px rgba(0,0,0,0.02); z-index: 10;}
        h2 { margin-top: 0; font-size: 1.3rem; font-weight: 600; color: #111827; margin-bottom: 24px; display: flex; align-items: center; gap: 10px;}
        
        /* المساحة الرئيسية */
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow-y: auto; background: #e5e7eb; background-image: radial-gradient(#d1d5db 1px, transparent 0); background-size: 20px 20px;}
        
        /* منطقة الإفلات */
        .drop-zone { border: 2px dashed #9ca3af; border-radius: 12px; padding: 60px 20px; text-align: center; background: #f9fafb; cursor: pointer; transition: all 0.2s ease; width: 90%; max-width: 600px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);}
        .drop-zone:hover { border-color: #3b82f6; background: #eff6ff; }
        .drop-zone p { color: #6b7280; margin-bottom: 20px; font-size: 1.1rem; }
        .drop-zone .sub-text { font-size: 0.9rem; color: #9ca3af; margin-top: 15px;}
        
        /* الأزرار */
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.95rem; width: 100%; display: inline-flex; justify-content: center; align-items: center;}
        .btn:hover { background: #2563eb; }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-secondary { background: white; color: #4b5563; border: 1px solid #d1d5db; margin-top: 12px;}
        .btn-secondary:hover { background: #f3f4f6; }
        
        /* الإعدادات */
        .control-group { margin-bottom: 24px; }
        .control-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: #374151; }
        .control-group select, .control-group input[type="number"] { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; background: white; outline: none; transition: 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
        .control-group select:focus, .control-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        
        /* المعاينة */
        #previewWrapper { display: none; flex-direction: column; width: 100%; height: 100%; align-items: center; justify-content: center; padding: 40px; overflow: auto; }
        #previewContainer { position: relative; display: inline-block; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); background: transparent; line-height: 0;}
        #previewImage { max-width: 100%; max-height: calc(100vh - 120px); display: block; border-radius: 4px;}
        
        #imageCounterInfo { margin-top: 20px; font-weight: bold; color: #2563eb; background: #eff6ff; padding: 8px 16px; border-radius: 20px; border: 1px solid #bfdbfe; }

        /* الشبكة */
        #gridOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border-radius: 4px; overflow: hidden;}
        .grid-line { position: absolute; background: #ef4444; z-index: 10; pointer-events: none; box-shadow: 0 0 4px rgba(255,255,255,0.8);}
        .grid-line.vertical { width: 2px; height: 100%; top: 0; transform: translateX(50%); }
        .grid-line.horizontal { height: 2px; width: 100%; left: 0; transform: translateY(-50%); }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto;}
            .sidebar { width: 100%; min-width: 100%; border-left: none; border-bottom: 1px solid #e5e7eb; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
            .main { padding: 20px; height: 100vh; }
            #previewWrapper { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="12" y1="3" x2="12" y2="21"></line>
        </svg>
        تقسيم الصور (جودة 100%)
    </h2>
    
    <div id="controlsPanel" style="display: none;">
        <div class="control-group">
            <label>طريقة التقسيم</label>
            <select id="splitType">
                <option value="vertical">طولياً (أعمدة)</option>
                <option value="horizontal">عرضياً (صفوف)</option>
                <option value="grid">شبكة (أعمدة وصفوف)</option>
            </select>
        </div>

        <div class="control-group" id="colControl">
            <label id="colLabel">عدد الأجزاء (الأعمدة)</label>
            <input type="number" id="cols" min="1" max="100" value="2">
        </div>

        <div class="control-group" id="rowControl" style="display: none;">
            <label id="rowLabel">عدد الأجزاء (الصفوف)</label>
            <input type="number" id="rows" min="1" max="100" value="2">
        </div>

        <button id="downloadBtn" class="btn">تجهيز وتحميل ملف (ZIP)</button>
        <button id="resetBtn" class="btn btn-secondary" onclick="resetApp()">رفع صور جديدة</button>
    </div>
</div>

<div class="main">
    <div id="dropZone" class="drop-zone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <p>اسحب وأفلت الصور هنا<br>(يدعم حتى 100 صورة)</p>
        <button class="btn" style="max-width: 200px;" onclick="document.getElementById('fileInput').click()">اختر الصور</button>
        <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
        <div class="sub-text">أو قم بلصق الصور باستخدام Ctrl+V</div>
    </div>

    <div id="previewWrapper">
        <div id="previewContainer">
            <img id="previewImage" src="" alt="Preview">
            <div id="gridOverlay"></div>
        </div>
        <div id="imageCounterInfo">يتم عرض الصورة الأولى كمعاينة فقط (القص سيطبق على جميع الصور)</div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const splitType = document.getElementById('splitType');
    const colsInput = document.getElementById('cols');
    const rowsInput = document.getElementById('rows');
    const colControl = document.getElementById('colControl');
    const rowControl = document.getElementById('rowControl');
    const downloadBtn = document.getElementById('downloadBtn');
    const imageCounterInfo = document.getElementById('imageCounterInfo');
    
    let currentImages =[]; 

    // --- التعامل مع الملفات ---
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#3b82f6';
        dropZone.style.background = '#eff6ff';
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#9ca3af';
        dropZone.style.background = '#f9fafb';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            handleFiles(e.dataTransfer.files);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files.length > 0) {
            handleFiles(e.target.files);
        }
    });

    document.addEventListener('paste', (e) => {
        if (e.clipboardData && e.clipboardData.files && e.clipboardData.files.length > 0) {
            handleFiles(e.clipboardData.files);
        }
    });

    async function handleFiles(fileList) {
        const files = Array.from(fileList).filter(f => f.type.startsWith('image/')).slice(0, 100);
        
        if (files.length === 0) {
            alert("يرجى رفع صور صالحة.");
            return;
        }

        currentImages =[];
        const loadImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => resolve({ file: file, img: img });
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        for (let file of files) {
            const imageData = await loadImage(file);
            currentImages.push(imageData);
        }

        if (currentImages.length > 0) {
            document.getElementById('previewImage').src = currentImages[0].img.src;
            document.getElementById('dropZone').style.display = 'none';
            document.getElementById('previewWrapper').style.display = 'flex';
            document.getElementById('controlsPanel').style.display = 'block';
            
            if(currentImages.length > 1) {
                imageCounterInfo.style.display = 'block';
                imageCounterInfo.innerText = `تم رفع ${currentImages.length} صور. يتم عرض الأولى فقط، والقص سيطبق على الجميع في ملف ZIP واحد.`;
            } else {
                imageCounterInfo.style.display = 'none';
            }

            updateControls();
        }
    }

    function resetApp() {
        currentImages =[];
        fileInput.value = "";
        document.getElementById('dropZone').style.display = 'block';
        document.getElementById('previewWrapper').style.display = 'none';
        document.getElementById('controlsPanel').style.display = 'none';
        dropZone.style.borderColor = '#9ca3af';
        dropZone.style.background = '#f9fafb';
    }

    // --- تحديث واجهة الإعدادات ---
    function updateControls() {
        const type = splitType.value;
        if (type === 'vertical') {
            colControl.style.display = 'block';
            rowControl.style.display = 'none';
            document.getElementById('colLabel').innerText = 'عدد الأجزاء (الأعمدة)';
            rowsInput.value = 1;
        } else if (type === 'horizontal') {
            colControl.style.display = 'none';
            rowControl.style.display = 'block';
            document.getElementById('rowLabel').innerText = 'عدد الأجزاء (الصفوف)';
            colsInput.value = 1;
        } else {
            colControl.style.display = 'block';
            rowControl.style.display = 'block';
            document.getElementById('colLabel').innerText = 'الأعمدة';
            document.getElementById('rowLabel').innerText = 'الصفوف';
            if (parseInt(colsInput.value) < 2) colsInput.value = 2;
            if (parseInt(rowsInput.value) < 2) rowsInput.value = 2;
        }
        updateGrid();
    }

    splitType.addEventListener('change', updateControls);
    colsInput.addEventListener('input', updateGrid);
    rowsInput.addEventListener('input', updateGrid);

    function validateInputs() {
        let cols = parseInt(colsInput.value);
        let rows = parseInt(rowsInput.value);

        if (isNaN(cols) || cols < 1) cols = 1;
        if (isNaN(rows) || rows < 1) rows = 1;
        
        if (cols > 100) cols = 100;
        if (rows > 100) rows = 100;
        
        return { cols, rows };
    }

    function updateGrid() {
        if (currentImages.length === 0) return;
        const gridOverlay = document.getElementById('gridOverlay');
        gridOverlay.innerHTML = '';
        
        const { cols, rows } = validateInputs();

        for (let i = 1; i < cols; i++) {
            const line = document.createElement('div');
            line.className = 'grid-line vertical';
            line.style.left = `${(i / cols) * 100}%`;
            gridOverlay.appendChild(line);
        }

        for (let i = 1; i < rows; i++) {
            const line = document.createElement('div');
            line.className = 'grid-line horizontal';
            line.style.top = `${(i / rows) * 100}%`;
            gridOverlay.appendChild(line);
        }
    }

    // --- معالجة جميع الصور ووضعها معاً في الـ ZIP ---
    downloadBtn.addEventListener('click', async () => {
        if (currentImages.length === 0) return;
        
        const zip = new JSZip();
        const { cols, rows } = validateInputs();

        downloadBtn.textContent = "جاري المعالجة...";
        downloadBtn.disabled = true;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const promises =[];

        // المرور على جميع الصور المرفوعة
        currentImages.forEach((imgData, index) => {
            const img = imgData.img;
            const file = imgData.file;
            const isJpeg = file.type === 'image/jpeg';
            const mimeType = isJpeg ? 'image/jpeg' : 'image/png';
            const ext = isJpeg ? 'jpg' : 'png';
            
            // اسم الصورة الأساسي بدون الامتداد
            let baseName = file.name ? file.name.replace(/\.[^/.]+$/, "") : "image";
            
            // لضمان عدم اختلاط أو استبدال أجزاء الصور ببعضها إذا كان لها نفس الاسم
            if (currentImages.length > 1) {
                baseName = `${baseName}_img${index + 1}`;
            }

            const sliceWidth = Math.floor(img.width / cols);
            const sliceHeight = Math.floor(img.height / rows);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    promises.push(new Promise((resolve) => {
                        canvas.width = sliceWidth;
                        canvas.height = sliceHeight;
                        
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        // رسم الجزء
                        ctx.drawImage(
                            img,
                            c * sliceWidth, r * sliceHeight, sliceWidth, sliceHeight,
                            0, 0, sliceWidth, sliceHeight
                        );
                        
                        canvas.toBlob((blob) => {
                            // يتم وضع جميع الأجزاء مباشرة في ملف الـ ZIP الرئيسي
                            const fileName = `${baseName}_row${r+1}_col${c+1}.${ext}`;
                            zip.file(fileName, blob);
                            resolve();
                        }, mimeType, 1.0); 
                    }));
                }
            }
        });

        // انتظار انتهاء المعالجة
        await Promise.all(promises);

        // إنشاء ملف الـ ZIP وتحميله
        zip.generateAsync({ type: 'blob' }).then((content) => {
            saveAs(content, 'all_split_images.zip');
            downloadBtn.textContent = "تجهيز وتحميل ملف (ZIP)";
            downloadBtn.disabled = false;
        });
    });
</script>

</body>
</html>
